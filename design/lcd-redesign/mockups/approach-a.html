<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Approach A — The Vinyl Groove</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--primary:#FFB1C8;--on-primary:#5D1133;--primary-container:#7B2949;--on-primary-container:#FFD9E3;
--secondary:#E3BDC6;--on-secondary:#422931;
--surface:#1A1114;--surface-container:#261A1E;--surface-container-high:#312228;--surface-container-low:#201318;
--on-surface:#F0DEE2;--on-surface-variant:#D5BFC4;--outline:#9E8C91;--outline-variant:#514347;
--bg:#1A1114;--error:#FFB4AB;
--shape-sm:8px;--shape-md:12px;--shape-lg:16px;--shape-xl:28px;--shape-full:9999px;
}
html,body{width:1920px;height:440px;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--on-surface);user-select:none}

/* ALBUM ART AREA */
.art-zone{position:absolute;left:0;top:0;width:480px;height:440px;cursor:pointer;z-index:2}
.art-zone .art{width:440px;height:440px;margin:0 auto;position:relative}
.art-zone .art-bg{width:100%;height:100%;border-radius:0;
  background:linear-gradient(135deg,#0a0a2e 0%,#1a0533 30%,#2d1b69 50%,#0a0a2e 70%,#000 100%);
  position:relative;overflow:hidden}
.art-zone .art-bg::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:0;height:0;border-left:120px solid transparent;border-right:120px solid transparent;border-bottom:200px solid rgba(255,255,255,0.04)}
.art-zone .art-bg::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 60%,rgba(100,50,200,0.3),transparent 60%),
  radial-gradient(circle at 70% 30%,rgba(20,20,80,0.5),transparent 50%)}

/* Vinyl shadow effect */
.art-zone .vinyl-shadow{position:absolute;top:0;right:-20px;width:44px;height:440px;
  background:linear-gradient(to right,rgba(0,0,0,0.6),transparent);z-index:3;pointer-events:none}
.art-zone .vinyl-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,0.06);
  background:radial-gradient(circle,rgba(0,0,0,0.5) 30%,transparent 31%)}

/* Art hover */
.art-zone:hover .art-bg{filter:brightness(1.1)}
.art-zone .art-label{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:6px 16px;border-radius:var(--shape-full);
  font-size:12px;color:var(--on-surface-variant);letter-spacing:0.5px;opacity:0;transition:opacity 0.3s}
.art-zone:hover .art-label{opacity:1}

/* LIBRARY OVERLAY */
.library-overlay{position:absolute;inset:0;background:rgba(26,17,20,0.95);backdrop-filter:blur(20px);
  z-index:10;opacity:0;pointer-events:none;transition:opacity 0.3s ease-out;display:flex;flex-direction:column;padding:24px 32px}
.library-overlay.open{opacity:1;pointer-events:auto}
.library-overlay h2{font-size:22px;font-weight:600;color:var(--primary);margin-bottom:16px}
.library-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;flex:1;overflow:hidden}
.library-tile{border-radius:var(--shape-md);overflow:hidden;cursor:pointer;position:relative;transition:transform 0.2s ease-out}
.library-tile:hover{transform:scale(1.05)}
.library-tile .tile-art{width:100%;aspect-ratio:1;display:block}
.library-tile .tile-name{font-size:11px;padding:6px 4px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--on-surface)}
.library-tile .tile-artist{font-size:10px;padding:0 4px 6px;color:var(--on-surface-variant);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.library-close{position:absolute;top:16px;right:24px;width:44px;height:44px;border-radius:50%;
  background:var(--surface-container-high);border:none;color:var(--on-surface);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.library-close:hover{background:var(--primary-container)}

/* INFO ZONE */
.info-zone{position:absolute;left:480px;top:0;right:0;height:440px;display:flex;flex-direction:column;padding:32px 40px 24px}

.track-title{font-size:36px;font-weight:700;letter-spacing:-0.5px;line-height:1.15;margin-bottom:4px}
.track-artist{font-size:20px;color:var(--on-surface-variant);font-weight:400;margin-bottom:2px}
.track-album{font-size:14px;color:var(--outline);font-weight:400;margin-bottom:12px}

.badges{display:flex;gap:8px;margin-bottom:20px}
.badge{padding:4px 12px;border-radius:var(--shape-full);font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500;
  background:var(--primary-container);color:var(--on-primary-container);letter-spacing:0.5px}
.badge.source{background:var(--surface-container-high);color:var(--on-surface-variant)}

/* SEEK */
.seek-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.seek-time{font-family:'Roboto Mono',monospace;font-size:13px;color:var(--outline);min-width:42px}
.seek-bar{flex:1;height:6px;background:var(--outline-variant);border-radius:3px;cursor:pointer;position:relative;overflow:visible}
.seek-bar .seek-fill{height:100%;background:var(--primary);border-radius:3px;width:36.2%;transition:width 0.15s;position:relative}
.seek-bar .seek-thumb{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:16px;height:16px;
  border-radius:50%;background:var(--primary);opacity:0;transition:opacity 0.2s}
.seek-bar:hover .seek-thumb{opacity:1}

/* TRANSPORT */
.transport-row{display:flex;align-items:center;gap:8px;margin-bottom:auto}
.btn{width:48px;height:48px;border-radius:50%;border:none;background:transparent;color:var(--on-surface);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s ease-out}
.btn:hover{background:var(--surface-container-high)}
.btn:active{transform:scale(0.92)}
.btn.play{width:56px;height:56px;background:var(--primary);color:var(--on-primary);font-size:26px;margin:0 4px}
.btn.play:hover{background:var(--on-primary-container);color:var(--primary-container)}
.btn.active{color:var(--primary)}
.btn.small{width:40px;height:40px;font-size:16px;color:var(--outline)}
.btn.small:hover{color:var(--on-surface)}

.volume-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.volume-bar{width:100px;height:4px;background:var(--outline-variant);border-radius:2px;cursor:pointer;position:relative}
.volume-fill{height:100%;width:72%;background:var(--secondary);border-radius:2px}

/* QUEUE STRIP */
.queue-section{margin-top:8px}
.queue-label{font-size:11px;color:var(--outline);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.queue-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.queue-strip::-webkit-scrollbar{display:none}
.queue-item{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--surface-container);
  border-radius:var(--shape-md);min-width:220px;max-width:260px;flex-shrink:0;cursor:pointer;transition:background 0.2s}
.queue-item:hover{background:var(--surface-container-high)}
.queue-item .q-num{font-size:12px;color:var(--outline);font-family:'Roboto Mono',monospace;min-width:16px}
.queue-item .q-info{flex:1;min-width:0}
.queue-item .q-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-item .q-dur{font-size:11px;color:var(--outline);font-family:'Roboto Mono',monospace}

/* SVG icons inline */
svg{fill:currentColor;flex-shrink:0}
</style>
</head>
<body>

<!-- ALBUM ART -->
<div class="art-zone" id="artZone">
  <div class="art">
    <div class="art-bg">
      <div class="vinyl-ring"></div>
    </div>
    <div class="vinyl-shadow"></div>
  </div>
  <div class="art-label">TAP TO BROWSE LIBRARY</div>
</div>

<!-- LIBRARY OVERLAY -->
<div class="library-overlay" id="libraryOverlay">
  <h2>Library</h2>
  <button class="library-close" id="libraryClose">✕</button>
  <div class="library-grid" id="libraryGrid"></div>
</div>

<!-- INFO -->
<div class="info-zone">
  <div class="track-title">Time</div>
  <div class="track-artist">Pink Floyd</div>
  <div class="track-album">The Dark Side of the Moon</div>
  <div class="badges">
    <span class="badge">FLAC</span>
    <span class="badge">96kHz</span>
    <span class="badge">24bit</span>
    <span class="badge source">NAS</span>
  </div>

  <div class="seek-row">
    <span class="seek-time" id="seekCur">2:34</span>
    <div class="seek-bar" id="seekBar">
      <div class="seek-fill" id="seekFill"><div class="seek-thumb"></div></div>
    </div>
    <span class="seek-time">7:04</span>
  </div>

  <div class="transport-row">
    <button class="btn small" id="btnShuffle" title="Shuffle">⇌</button>
    <button class="btn" title="Previous">⏮</button>
    <button class="btn play" id="btnPlay" title="Play/Pause">▶</button>
    <button class="btn" title="Next">⏭</button>
    <button class="btn small" id="btnRepeat" title="Repeat">⟳</button>
    <div class="volume-group">
      <span style="font-size:16px;color:var(--outline)">🔊</span>
      <div class="volume-bar" id="volBar"><div class="volume-fill" id="volFill"></div></div>
    </div>
  </div>

  <div class="queue-section">
    <div class="queue-label">Up Next</div>
    <div class="queue-strip" id="queueStrip"></div>
  </div>
</div>

<script>
// Queue data
const queue = [
  {title:"The Great Gig in the Sky",artist:"Pink Floyd",dur:"5:43"},
  {title:"Money",artist:"Pink Floyd",dur:"6:22"},
  {title:"Us and Them",artist:"Pink Floyd",dur:"7:49"},
  {title:"Any Colour You Like",artist:"Pink Floyd",dur:"3:25"},
  {title:"Brain Damage",artist:"Pink Floyd",dur:"3:50"},
];
const strip = document.getElementById('queueStrip');
queue.forEach((t,i) => {
  const d = document.createElement('div');
  d.className = 'queue-item';
  d.innerHTML = `<span class="q-num">${i+1}</span><div class="q-info"><div class="q-title">${t.title}</div></div><span class="q-dur">${t.dur}</span>`;
  strip.appendChild(d);
});

// Library data
const albums = [
  {name:"Wish You Were Here",artist:"Pink Floyd",g:"linear-gradient(135deg,#1a3a2a,#0a1a10)"},
  {name:"Animals",artist:"Pink Floyd",g:"linear-gradient(135deg,#2a2a3a,#1a1a2a)"},
  {name:"The Wall",artist:"Pink Floyd",g:"linear-gradient(135deg,#fff 0%,#eee 100%)"},
  {name:"OK Computer",artist:"Radiohead",g:"linear-gradient(135deg,#2a3a4a,#0a1520)"},
  {name:"Kid A",artist:"Radiohead",g:"linear-gradient(135deg,#3a2020,#1a0a0a)"},
  {name:"Random Access Memories",artist:"Daft Punk",g:"linear-gradient(135deg,#1a1a30,#0a0a18)"},
  {name:"Rumours",artist:"Fleetwood Mac",g:"linear-gradient(135deg,#3a3020,#1a1810)"},
  {name:"Abbey Road",artist:"The Beatles",g:"linear-gradient(135deg,#2a3a5a,#102030)"},
  {name:"Blue Train",artist:"John Coltrane",g:"linear-gradient(135deg,#0a2040,#051020)"},
  {name:"Kind of Blue",artist:"Miles Davis",g:"linear-gradient(135deg,#1a2a4a,#0a1020)"},
  {name:"Head Hunters",artist:"Herbie Hancock",g:"linear-gradient(135deg,#4a3a10,#201a08)"},
  {name:"Homework",artist:"Daft Punk",g:"linear-gradient(135deg,#3a1a1a,#1a0a0a)"},
  {name:"In Rainbows",artist:"Radiohead",g:"linear-gradient(135deg,#4a2020,#200a0a)"},
  {name:"Amnesiac",artist:"Radiohead",g:"linear-gradient(135deg,#2a1020,#100510)"},
  {name:"Meddle",artist:"Pink Floyd",g:"linear-gradient(135deg,#1a3a3a,#0a1a1a)"},
  {name:"Atom Heart Mother",artist:"Pink Floyd",g:"linear-gradient(135deg,#3a4a1a,#1a200a)"},
];
const grid = document.getElementById('libraryGrid');
albums.forEach(a => {
  const d = document.createElement('div');
  d.className = 'library-tile';
  d.innerHTML = `<div class="tile-art" style="background:${a.g}"></div><div class="tile-name">${a.name}</div><div class="tile-artist">${a.artist}</div>`;
  grid.appendChild(d);
});

// Library overlay
document.getElementById('artZone').addEventListener('click', () => document.getElementById('libraryOverlay').classList.add('open'));
document.getElementById('libraryClose').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('libraryOverlay').classList.remove('open'); });

// Play/pause
let playing = true;
const btnPlay = document.getElementById('btnPlay');
btnPlay.addEventListener('click', () => { playing = !playing; btnPlay.textContent = playing ? '▶' : '⏸'; });

// Shuffle/repeat toggle
document.getElementById('btnShuffle').addEventListener('click', function(){ this.classList.toggle('active'); });
document.getElementById('btnRepeat').addEventListener('click', function(){ this.classList.toggle('active'); });

// Seek bar click
const totalSec = 7*60+4;
document.getElementById('seekBar').addEventListener('click', function(e){
  const r = this.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  document.getElementById('seekFill').style.width = (pct*100)+'%';
  const s = Math.round(pct * totalSec);
  document.getElementById('seekCur').textContent = Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
});

// Volume bar click
document.getElementById('volBar').addEventListener('click', function(e){
  const r = this.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  document.getElementById('volFill').style.width = (pct*100)+'%';
});
</script>
</body>
</html>
