<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Fullscreen LCD Player — PoC</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --md-primary: #FFB1C8;
    --md-on-primary: #5D1133;
    --md-primary-container: #7B2949;
    --md-on-primary-container: #FFD9E3;
    --md-secondary: #E3BDC6;
    --md-surface: #1A1114;
    --md-surface-container: #261A1E;
    --md-surface-container-high: #312228;
    --md-on-surface: #F0DEE2;
    --md-on-surface-variant: #D5BFC4;
    --md-outline: #9E8C91;
    --md-outline-variant: #514347;
    --md-background: #1A1114;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 440px;
    overflow: hidden;
    background: var(--md-background);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--md-on-surface);
    user-select: none;
    -webkit-user-select: none;
  }

  .player-layout {
    display: flex;
    width: 1920px;
    height: 440px;
    position: relative;
  }

  /* ─── Album Art (Left) ─── */
  .art-section {
    width: 440px;
    height: 440px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .album-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .art-fallback {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a0533 30%, #2d1b69 50%, #0a0a2e 70%, #000 100%);
  }
  /* Soft edge fade from art into the info area */
  .art-edge {
    position: absolute;
    top: 0; right: 0;
    width: 80px;
    height: 100%;
    background: linear-gradient(to right, transparent, var(--md-background));
  }

  /* ─── Info Section (Middle) ─── */
  .info-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 48px;
    min-width: 0;
    position: relative;
    z-index: 2;
  }

  .track-title {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .track-artist {
    font-size: 28px;
    font-weight: 400;
    color: var(--md-on-surface-variant);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .track-album {
    font-size: 20px;
    font-weight: 400;
    color: var(--md-outline);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 24px;
  }

  /* Quality badge */
  .quality-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 9999px;
    background: rgba(123, 41, 73, 0.3);
    border: 1px solid rgba(255, 177, 200, 0.2);
    font-family: 'Roboto Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--md-primary);
    letter-spacing: 0.5px;
    margin-bottom: 28px;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 0;
  }
  .progress-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 16px;
    color: var(--md-outline);
    min-width: 50px;
  }
  .progress-time.end { text-align: right; }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--md-outline-variant);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: var(--md-primary);
    border-radius: 3px;
    transition: width 0.3s linear;
  }

  /* ─── VU / Visualization Section (Right) ─── */
  .viz-section {
    width: 500px;
    height: 440px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #vizCanvas {
    width: 500px;
    height: 440px;
  }

  /* ─── Viz mode label ─── */
  .viz-mode-label {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--md-outline);
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 5;
  }
  .viz-mode-label.visible {
    opacity: 1;
  }

  /* ─── Click hint ─── */
  .click-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--md-outline);
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="player-layout">
  <!-- Album Art -->
  <div class="art-section">
    <div class="art-fallback"></div>
    <div class="art-edge"></div>
  </div>

  <!-- Track Info -->
  <div class="info-section">
    <div class="track-title" id="trackTitle">So What</div>
    <div class="track-artist" id="trackArtist">Miles Davis</div>
    <div class="track-album" id="trackAlbum">Kind of Blue</div>
    <div class="quality-badge" id="qualityBadge">FLAC · 352.8kHz · 24bit</div>
    <div class="progress-wrap">
      <span class="progress-time" id="elapsed">2:34</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width: 36%"></div>
      </div>
      <span class="progress-time end" id="total">9:24</span>
    </div>
  </div>

  <!-- Visualization -->
  <div class="viz-section" id="vizSection">
    <canvas id="vizCanvas" width="500" height="440"></canvas>
    <div class="viz-mode-label" id="modeLabel">FREQUENCY BARS</div>
  </div>
</div>

<div class="click-hint">Click visualization to cycle modes · Double-click to toggle</div>

<script>
'use strict';

const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
const W = 500, H = 440;
const modeLabel = document.getElementById('modeLabel');

// ─── Visualization Modes ───
const MODES = ['bars', 'vu-digital', 'waveform'];
const MODE_LABELS = { 
  'bars': 'FREQUENCY BARS', 
  'vu-digital': 'DIGITAL VU METER',
  'waveform': 'WAVEFORM'
};
let currentMode = 0;
let modeLabelTimeout = null;

function showModeLabel() {
  modeLabel.textContent = MODE_LABELS[MODES[currentMode]];
  modeLabel.classList.add('visible');
  clearTimeout(modeLabelTimeout);
  modeLabelTimeout = setTimeout(() => modeLabel.classList.remove('visible'), 2000);
}

// ─── Fake Audio Data ───
const NUM_BARS = 48;
const barData = new Float32Array(NUM_BARS);
const barTargets = new Float32Array(NUM_BARS);
const barVelocities = new Float32Array(NUM_BARS);

// Waveform data
const WAVE_POINTS = 200;
const waveData = new Float32Array(WAVE_POINTS);

let noisePhase = 0;
function fakeSpectrum(time) {
  noisePhase += 0.008;
  for (let i = 0; i < NUM_BARS; i++) {
    const freq = i / NUM_BARS;
    const bass = Math.pow(Math.sin(time * 1.2 + i * 0.05), 2) * (1 - freq * 0.6);
    const mid = Math.sin(time * 2.8 + i * 0.12) * 0.5 * Math.exp(-Math.pow(freq - 0.35, 2) * 20);
    const treble = Math.sin(time * 4.5 + i * 0.25) * 0.3 * freq;
    const noise = (Math.sin(noisePhase * 3.7 + i * 1.3) * 0.5 + 0.5) * 0.2;
    const pulse = Math.pow(Math.sin(time * 0.7), 4) * 0.25 * (1 - freq);
    barTargets[i] = Math.max(0.02, Math.min(1, bass + mid + treble + noise + pulse));
  }
  // Waveform
  for (let i = 0; i < WAVE_POINTS; i++) {
    const t = i / WAVE_POINTS;
    waveData[i] = Math.sin(time * 3 + t * 12) * 0.3
      + Math.sin(time * 1.7 + t * 5) * 0.25
      + Math.sin(time * 5.2 + t * 20) * 0.1
      + (Math.random() - 0.5) * 0.05;
  }
}

function smoothBars() {
  for (let i = 0; i < NUM_BARS; i++) {
    const diff = barTargets[i] - barData[i];
    barVelocities[i] += diff * 0.25;
    barVelocities[i] *= 0.72;
    barData[i] += barVelocities[i];
    barData[i] = Math.max(0.01, Math.min(1, barData[i]));
  }
}

// ─── Draw: Frequency Bars ───
function drawBars(time) {
  ctx.clearRect(0, 0, W, H);
  
  const gap = 3;
  const margin = 20;
  const drawW = W - margin * 2;
  const totalGap = gap * (NUM_BARS - 1);
  const barW = (drawW - totalGap) / NUM_BARS;
  const maxH = H - 60;

  // Subtle background glow
  const bgGlow = ctx.createRadialGradient(W/2, H, 0, W/2, H, W * 0.7);
  bgGlow.addColorStop(0, 'rgba(120, 30, 80, 0.08)');
  bgGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = bgGlow;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < NUM_BARS; i++) {
    const val = barData[i];
    const x = margin + i * (barW + gap);
    const h = val * maxH;

    // Glow
    ctx.save();
    ctx.shadowColor = `rgba(255, 80, 180, ${val * 0.4})`;
    ctx.shadowBlur = 8 + val * 14;

    // Bar gradient
    const g = ctx.createLinearGradient(x, H - 20, x, H - 20 - h);
    g.addColorStop(0, 'rgba(90, 20, 80, 0.9)');
    g.addColorStop(0.3, 'rgba(160, 40, 100, 0.9)');
    g.addColorStop(0.6, 'rgba(255, 100, 170, 0.85)');
    g.addColorStop(1, `rgba(255, 177, 200, ${0.7 + val * 0.3})`);
    ctx.fillStyle = g;

    const r = Math.min(barW / 2, 2);
    ctx.beginPath();
    ctx.roundRect(x, H - 20 - h, barW, h, [r, r, 0, 0]);
    ctx.fill();
    ctx.restore();

    // Peak cap
    if (val > 0.1) {
      ctx.fillStyle = `rgba(255, 220, 240, ${val * 0.8})`;
      ctx.fillRect(x, H - 20 - h, barW, 2);
    }
  }
}

// ─── Draw: Digital VU Meter ───
const vuPeakL = { value: 0, decay: 0 };
const vuPeakR = { value: 0, decay: 0 };

function drawVU(time) {
  ctx.clearRect(0, 0, W, H);

  // Calculate L/R levels from bar data
  let levelL = 0, levelR = 0;
  for (let i = 0; i < NUM_BARS; i++) {
    if (i % 2 === 0) levelL += barData[i];
    else levelR += barData[i];
  }
  levelL = Math.min(1, (levelL / (NUM_BARS / 2)) * 2.2);
  levelR = Math.min(1, (levelR / (NUM_BARS / 2)) * 2.2);

  // Update peaks
  if (levelL > vuPeakL.value) { vuPeakL.value = levelL; vuPeakL.decay = 0; }
  else { vuPeakL.decay += 0.02; vuPeakL.value = Math.max(levelL, vuPeakL.value - vuPeakL.decay * 0.03); }
  if (levelR > vuPeakR.value) { vuPeakR.value = levelR; vuPeakR.decay = 0; }
  else { vuPeakR.decay += 0.02; vuPeakR.value = Math.max(levelR, vuPeakR.value - vuPeakR.decay * 0.03); }

  const numSegments = 32;
  const meterWidth = 180;
  const segH = 10;
  const segGap = 2;
  const meterH = numSegments * (segH + segGap);
  const startY = (H - meterH) / 2;
  const leftX = (W / 2) - meterWidth - 30;
  const rightX = (W / 2) + 30;

  // Labels
  ctx.font = '600 16px "Plus Jakarta Sans"';
  ctx.fillStyle = 'rgba(255, 177, 200, 0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('L', leftX + meterWidth / 2, startY - 12);
  ctx.fillText('R', rightX + meterWidth / 2, startY - 12);

  // dB scale on sides
  ctx.font = '400 10px "Roboto Mono"';
  ctx.fillStyle = 'rgba(158, 140, 145, 0.5)';
  ctx.textAlign = 'right';
  const dbMarks = [0, -6, -12, -24, -48];
  dbMarks.forEach(db => {
    const norm = 1 + db / 48; // -48dB = 0, 0dB = 1
    const y = startY + meterH - (norm * meterH);
    ctx.fillText(`${db}`, leftX - 8, y + 4);
  });

  function drawMeter(x, level, peak) {
    for (let i = 0; i < numSegments; i++) {
      const segNorm = (i + 1) / numSegments;
      const y = startY + meterH - (i + 1) * (segH + segGap);
      const isLit = segNorm <= level;
      const isPeak = Math.abs(segNorm - peak) < 1 / numSegments;

      if (isLit || isPeak) {
        let color;
        if (segNorm > 0.9) {
          color = isPeak && !isLit ? 'rgba(255, 80, 80, 0.9)' : 'rgba(255, 60, 60, 0.95)';
        } else if (segNorm > 0.7) {
          color = isPeak && !isLit ? 'rgba(255, 200, 80, 0.7)' : 'rgba(255, 180, 60, 0.9)';
        } else {
          color = isPeak && !isLit ? 'rgba(255, 177, 200, 0.6)' : `rgba(255, 177, 200, ${0.5 + segNorm * 0.5})`;
        }

        ctx.fillStyle = color;
        if (isLit) {
          ctx.shadowColor = color;
          ctx.shadowBlur = 4 + segNorm * 6;
        }
        ctx.fillRect(x, y, meterWidth, segH);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = 'rgba(81, 67, 71, 0.3)';
        ctx.fillRect(x, y, meterWidth, segH);
      }
    }
  }

  drawMeter(leftX, levelL, vuPeakL.value);
  drawMeter(rightX, levelR, vuPeakR.value);

  // Level readout
  ctx.font = '500 13px "Roboto Mono"';
  ctx.fillStyle = 'rgba(255, 177, 200, 0.7)';
  ctx.textAlign = 'center';
  const dbL = levelL > 0.001 ? (20 * Math.log10(levelL)).toFixed(1) : '-∞';
  const dbR = levelR > 0.001 ? (20 * Math.log10(levelR)).toFixed(1) : '-∞';
  ctx.fillText(`${dbL} dB`, leftX + meterWidth / 2, startY + meterH + 24);
  ctx.fillText(`${dbR} dB`, rightX + meterWidth / 2, startY + meterH + 24);
}

// ─── Draw: Waveform ───
function drawWaveform(time) {
  ctx.clearRect(0, 0, W, H);

  const margin = 30;
  const drawW = W - margin * 2;
  const centerY = H / 2;
  const amplitude = H * 0.35;

  // Glow layer
  ctx.save();
  ctx.shadowColor = 'rgba(255, 177, 200, 0.4)';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(255, 177, 200, 0.8)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i < WAVE_POINTS; i++) {
    const x = margin + (i / WAVE_POINTS) * drawW;
    const y = centerY + waveData[i] * amplitude;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();

  // Thin bright line on top
  ctx.strokeStyle = 'rgba(255, 220, 240, 0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < WAVE_POINTS; i++) {
    const x = margin + (i / WAVE_POINTS) * drawW;
    const y = centerY + waveData[i] * amplitude;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Center line
  ctx.strokeStyle = 'rgba(81, 67, 71, 0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(margin, centerY);
  ctx.lineTo(W - margin, centerY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Fill below/above
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = 'rgba(255, 177, 200, 1)';
  ctx.beginPath();
  ctx.moveTo(margin, centerY);
  for (let i = 0; i < WAVE_POINTS; i++) {
    const x = margin + (i / WAVE_POINTS) * drawW;
    const y = centerY + waveData[i] * amplitude;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W - margin, centerY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ─── Animation Loop ───
let startTime = performance.now();
let frameCount = 0;
let lastFpsTime = 0;
let fps = 0;

function animate(now) {
  const time = (now - startTime) / 1000;

  // FPS counter
  frameCount++;
  if (now - lastFpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
  }

  fakeSpectrum(time);
  smoothBars();

  switch (MODES[currentMode]) {
    case 'bars': drawBars(time); break;
    case 'vu-digital': drawVU(time); break;
    case 'waveform': drawWaveform(time); break;
  }

  // FPS overlay
  ctx.font = '400 11px "Roboto Mono"';
  ctx.fillStyle = 'rgba(158, 140, 145, 0.4)';
  ctx.textAlign = 'left';
  ctx.fillText(`${fps} fps`, 8, 16);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
showModeLabel();

// ─── Progress simulation ───
let progress = 0.36;
const progressFill = document.getElementById('progressFill');
const elapsedEl = document.getElementById('elapsed');
setInterval(() => {
  progress += 0.001;
  if (progress > 1) progress = 0;
  progressFill.style.width = (progress * 100) + '%';
  const totalSec = 9 * 60 + 24;
  const cur = Math.floor(progress * totalSec);
  const m = Math.floor(cur / 60);
  const s = cur % 60;
  elapsedEl.textContent = m + ':' + s.toString().padStart(2, '0');
}, 300);

// ─── Click to cycle modes ───
document.getElementById('vizSection').addEventListener('click', () => {
  currentMode = (currentMode + 1) % MODES.length;
  showModeLabel();
});
</script>
</body>
</html>
