<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Approach D — The Jukebox</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --md-primary: #FFB1C8;
    --md-on-primary: #5D1133;
    --md-primary-container: #7B2949;
    --md-on-primary-container: #FFD9E3;
    --md-secondary: #E3BDC6;
    --md-on-secondary: #422931;
    --md-surface: #1A1114;
    --md-surface-container: #261A1E;
    --md-surface-container-high: #312228;
    --md-surface-container-low: #201318;
    --md-on-surface: #F0DEE2;
    --md-on-surface-variant: #D5BFC4;
    --md-outline: #9E8C91;
    --md-outline-variant: #514347;
    --md-background: #1A1114;
    --md-error: #FFB4AB;
  }

  html, body {
    width: 1920px;
    height: 440px;
    overflow: hidden;
    background: var(--md-background);
    font-family: 'Plus Jakarta Sans', 'Roboto', sans-serif;
    color: var(--md-on-surface);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ── Source Filter Bar (top 40px) ── */
  .source-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    z-index: 20;
    background: var(--md-surface-container-low);
    border-bottom: 1px solid var(--md-outline-variant);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 4px;
  }

  .source-tab {
    padding: 6px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--md-outline);
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 9999px;
    transition: all 0.2s ease-out;
    white-space: nowrap;
    min-height: 32px;
  }
  .source-tab:hover {
    color: var(--md-on-surface-variant);
    background: rgba(255,177,200,0.06);
  }
  .source-tab.active {
    color: var(--md-on-primary-container);
    background: var(--md-primary-container);
    font-weight: 600;
  }

  .source-bar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--md-outline);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease-out;
  }
  .search-btn:hover {
    color: var(--md-on-surface-variant);
    background: rgba(255,177,200,0.08);
  }
  .search-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* ── Album Carousel Area (40px to 340px = 300px) ── */
  .carousel-area {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    height: 300px;
    overflow: hidden;
  }

  .carousel-scroll {
    display: flex;
    gap: 16px;
    padding: 10px 32px;
    height: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .carousel-scroll::-webkit-scrollbar { display: none; }

  .album-tile {
    flex: 0 0 auto;
    width: 220px;
    scroll-snap-align: start;
    cursor: pointer;
    transition: transform 0.25s ease-out;
  }
  .album-tile:hover {
    transform: translateY(-4px);
  }
  .album-tile:active {
    transform: translateY(0) scale(0.98);
  }

  .album-cover-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 4px 16px rgba(0,0,0,0.4),
      0 1px 4px rgba(0,0,0,0.3);
    transition: box-shadow 0.25s ease-out;
  }
  .album-tile:hover .album-cover-wrap {
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.4),
      0 0 0 2px rgba(255,177,200,0.15);
  }

  .album-cover {
    width: 100%;
    height: 100%;
    transition: transform 0.3s ease-out;
  }
  .album-tile:hover .album-cover {
    transform: scale(1.04);
  }

  /* Play overlay on hover */
  .album-play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26, 17, 20, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s ease-out;
  }
  .album-tile:hover .album-play-overlay {
    opacity: 1;
  }
  .album-play-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--md-primary);
    color: var(--md-on-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(255,177,200,0.3);
    transition: transform 0.2s ease-out;
  }
  .album-tile:hover .album-play-circle {
    transform: scale(1);
  }
  .album-play-circle svg {
    width: 26px;
    height: 26px;
    fill: currentColor;
    margin-left: 2px;
  }

  .album-meta {
    padding: 8px 2px 0;
  }
  .album-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--md-on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .album-artist {
    font-size: 12px;
    font-weight: 400;
    color: var(--md-outline);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Gradient album art placeholders */
  .grad-1 { background: linear-gradient(135deg, #0a0a2e 0%, #1a0533 30%, #2d1045 50%, #0a0a2e 70%, #000 100%); }
  .grad-2 { background: linear-gradient(135deg, #1a2a1a 0%, #0a3020 40%, #1a4a30 70%, #0a1a0a 100%); }
  .grad-3 { background: linear-gradient(135deg, #2a1a0a 0%, #4a2a0a 40%, #6a3a1a 70%, #1a0a00 100%); }
  .grad-4 { background: linear-gradient(135deg, #0a1a2a 0%, #0a2a4a 40%, #1a3a6a 70%, #000a1a 100%); }
  .grad-5 { background: linear-gradient(135deg, #2a0a2a 0%, #4a0a3a 40%, #6a1a5a 70%, #1a001a 100%); }
  .grad-6 { background: linear-gradient(135deg, #2a2a0a 0%, #4a4a0a 40%, #3a3a1a 70%, #1a1a00 100%); }
  .grad-7 { background: linear-gradient(135deg, #0a2a2a 0%, #0a4a4a 40%, #1a5a5a 70%, #001a1a 100%); }
  .grad-8 { background: linear-gradient(135deg, #1a0a0a 0%, #3a1a1a 40%, #5a2a2a 70%, #0a0000 100%); }
  .grad-9 { background: linear-gradient(135deg, #1a1a2a 0%, #2a2a4a 40%, #3a3a5a 70%, #0a0a1a 100%); }
  .grad-10 { background: linear-gradient(135deg, #0a1a0a 0%, #1a3a0a 40%, #2a5a1a 70%, #001a00 100%); }
  .grad-11 { background: linear-gradient(135deg, #2a1a2a 0%, #3a2a3a 40%, #5a3a5a 70%, #1a0a1a 100%); }
  .grad-12 { background: linear-gradient(135deg, #1a2a2a 0%, #0a3a3a 40%, #1a4a4a 70%, #0a1a1a 100%); }

  /* DSOTM prism overlay */
  .prism::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 70px solid rgba(255,255,255,0.1);
    z-index: 2;
  }
  .prism::after {
    content: '';
    position: absolute;
    top: 30%;
    right: 10%;
    width: 65px;
    height: 3px;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, violet);
    transform: rotate(30deg);
    opacity: 0.45;
    z-index: 2;
    border-radius: 2px;
  }

  /* ── Player Bar (bottom 100px) ── */
  .player-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    z-index: 30;
    background: var(--md-surface-container);
    border-top: 1px solid var(--md-outline-variant);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 20px;
  }

  /* Now playing art */
  .player-art {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }
  .player-art-inner {
    width: 100%;
    height: 100%;
  }
  /* Mini prism */
  .player-art::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 28px solid rgba(255,255,255,0.12);
    z-index: 2;
  }

  /* Track info */
  .player-info {
    flex: 0 0 200px;
    min-width: 0;
  }
  .player-track {
    font-size: 15px;
    font-weight: 600;
    color: var(--md-on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .player-artist {
    font-size: 13px;
    font-weight: 400;
    color: var(--md-on-surface-variant);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Transport */
  .player-transport {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .p-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: var(--md-on-surface-variant);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease-out;
  }
  .p-btn:hover {
    color: var(--md-on-surface);
    background: rgba(255,177,200,0.1);
  }
  .p-btn:active {
    transform: scale(0.92);
  }
  .p-btn svg { width: 22px; height: 22px; fill: currentColor; }

  .p-play {
    width: 48px;
    height: 48px;
    background: var(--md-primary);
    color: var(--md-on-primary);
    box-shadow: 0 2px 12px rgba(255,177,200,0.25);
  }
  .p-play:hover {
    background: var(--md-on-primary-container);
    color: var(--md-primary-container);
    transform: scale(1.05);
  }
  .p-play svg { width: 24px; height: 24px; }

  /* Seek area */
  .player-seek {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .player-time {
    font-size: 11px;
    font-weight: 400;
    color: var(--md-outline);
    font-family: 'Roboto', monospace;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 36px;
  }
  .seek-track-bar {
    flex: 1;
    height: 32px;
    display: flex;
    align-items: center;
    cursor: pointer;
    position: relative;
  }
  .seek-rail {
    width: 100%;
    height: 4px;
    background: var(--md-outline-variant);
    border-radius: 2px;
    position: relative;
    transition: height 0.15s ease-out;
  }
  .seek-track-bar:hover .seek-rail {
    height: 6px;
  }
  .seek-progress {
    height: 100%;
    width: 36.1%;
    background: var(--md-primary);
    border-radius: 2px;
    position: relative;
    transition: width 0.15s linear;
  }
  .seek-progress::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--md-primary);
    box-shadow: 0 0 6px rgba(255,177,200,0.4);
    transition: transform 0.15s ease-out;
  }
  .seek-track-bar:hover .seek-progress::after {
    transform: translateY(-50%) scale(1);
  }

  /* Volume */
  .player-volume {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    width: 130px;
  }
  .vol-icon {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--md-outline);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .vol-icon:hover { color: var(--md-on-surface-variant); }
  .vol-icon svg { width: 18px; height: 18px; fill: currentColor; }
  .vol-track {
    flex: 1;
    height: 28px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }
  .vol-rail {
    width: 100%;
    height: 3px;
    background: var(--md-outline-variant);
    border-radius: 2px;
    position: relative;
  }
  .vol-fill {
    height: 100%;
    width: 78%;
    background: var(--md-on-surface-variant);
    border-radius: 2px;
  }

  /* Format badge in player bar */
  .player-badge {
    flex-shrink: 0;
    padding: 5px 12px;
    background: var(--md-surface-container-high);
    border: 1px solid var(--md-outline-variant);
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--md-primary);
    box-shadow: 0 0 6px rgba(255,177,200,0.4);
  }

  /* ── Scroll arrows ── */
  .scroll-arrow {
    position: absolute;
    top: 40px;
    width: 48px;
    height: 280px;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--md-on-surface-variant);
    opacity: 0;
    transition: opacity 0.2s ease-out;
  }
  .carousel-area:hover ~ .scroll-arrow,
  .scroll-arrow:hover {
    opacity: 1;
  }
  .scroll-arrow-left {
    left: 0;
    background: linear-gradient(90deg, var(--md-background) 0%, transparent 100%);
  }
  .scroll-arrow-right {
    right: 0;
    background: linear-gradient(270deg, var(--md-background) 0%, transparent 100%);
  }
  .scroll-arrow svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
    filter: drop-shadow(0 0 8px rgba(0,0,0,0.6));
  }
</style>
</head>
<body>

<!-- Source Filter Bar -->
<div class="source-bar">
  <button class="source-tab active" data-filter="all">All Music</button>
  <button class="source-tab" data-filter="nas">NAS</button>
  <button class="source-tab" data-filter="playlists">Playlists</button>
  <button class="source-tab" data-filter="radio">Radio</button>
  <button class="source-tab" data-filter="favorites">Favorites</button>
  <div class="source-bar-right">
    <button class="search-btn" title="Search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
</div>

<!-- Carousel Area -->
<div class="carousel-area">
  <div class="carousel-scroll" id="carousel"></div>
</div>

<!-- Scroll Arrows -->
<div class="scroll-arrow scroll-arrow-left" id="scrollLeft">
  <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
</div>
<div class="scroll-arrow scroll-arrow-right" id="scrollRight">
  <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
</div>

<!-- Player Bar -->
<div class="player-bar">
  <div class="player-art">
    <div class="player-art-inner grad-1"></div>
  </div>
  <div class="player-info">
    <div class="player-track" id="pTrack">Time</div>
    <div class="player-artist" id="pArtist">Pink Floyd — The Dark Side of the Moon</div>
  </div>
  <div class="player-transport">
    <button class="p-btn" id="pPrev" title="Previous">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="p-btn p-play" id="pPlay" title="Play/Pause">
      <svg viewBox="0 0 24 24" id="pPlayIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="p-btn" id="pNext" title="Next">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
  </div>
  <div class="player-seek">
    <span class="player-time" id="pTimeNow">2:34</span>
    <div class="seek-track-bar" id="pSeekBar">
      <div class="seek-rail">
        <div class="seek-progress" id="pSeekFill"></div>
      </div>
    </div>
    <span class="player-time" id="pTimeDur">7:04</span>
  </div>
  <div class="player-volume">
    <button class="vol-icon" title="Volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
    <div class="vol-track" id="volTrack">
      <div class="vol-rail">
        <div class="vol-fill" id="volFill"></div>
      </div>
    </div>
  </div>
  <div class="player-badge">
    <span class="badge-dot"></span>
    FLAC · 96kHz · 24bit
  </div>
</div>

<script>
  // ── Album Data ──
  const albumSets = {
    all: [
      { name: 'The Dark Side of the Moon', artist: 'Pink Floyd', grad: 'grad-1', prism: true },
      { name: 'OK Computer', artist: 'Radiohead', grad: 'grad-4' },
      { name: 'Abbey Road', artist: 'The Beatles', grad: 'grad-2' },
      { name: 'Kind of Blue', artist: 'Miles Davis', grad: 'grad-9' },
      { name: 'Rumours', artist: 'Fleetwood Mac', grad: 'grad-3' },
      { name: 'In Rainbows', artist: 'Radiohead', grad: 'grad-5' },
      { name: 'Blue Train', artist: 'John Coltrane', grad: 'grad-7' },
      { name: 'Wish You Were Here', artist: 'Pink Floyd', grad: 'grad-6' },
      { name: 'A Love Supreme', artist: 'John Coltrane', grad: 'grad-8' },
      { name: 'Kid A', artist: 'Radiohead', grad: 'grad-11' },
      { name: 'Bitches Brew', artist: 'Miles Davis', grad: 'grad-10' },
      { name: 'The Wall', artist: 'Pink Floyd', grad: 'grad-12' },
    ],
    nas: [
      { name: 'The Dark Side of the Moon', artist: 'Pink Floyd', grad: 'grad-1', prism: true },
      { name: 'Kind of Blue', artist: 'Miles Davis', grad: 'grad-9' },
      { name: 'Blue Train', artist: 'John Coltrane', grad: 'grad-7' },
      { name: 'A Love Supreme', artist: 'John Coltrane', grad: 'grad-8' },
      { name: 'Wish You Were Here', artist: 'Pink Floyd', grad: 'grad-6' },
      { name: 'Bitches Brew', artist: 'Miles Davis', grad: 'grad-10' },
      { name: 'The Wall', artist: 'Pink Floyd', grad: 'grad-12' },
      { name: 'Abbey Road', artist: 'The Beatles', grad: 'grad-2' },
    ],
    playlists: [
      { name: 'Late Night Jazz', artist: 'Various Artists', grad: 'grad-9' },
      { name: 'Morning Acoustics', artist: 'Various Artists', grad: 'grad-2' },
      { name: 'Deep Focus', artist: 'Various Artists', grad: 'grad-4' },
      { name: 'Vinyl Classics', artist: 'Various Artists', grad: 'grad-3' },
      { name: 'Sunday Sessions', artist: 'Various Artists', grad: 'grad-11' },
    ],
    radio: [
      { name: 'BBC Radio 3', artist: 'Classical & Arts', grad: 'grad-4' },
      { name: 'KEXP 90.3 FM', artist: 'Seattle, WA', grad: 'grad-10' },
      { name: 'FIP Radio', artist: 'Paris, France', grad: 'grad-5' },
      { name: 'Radio Paradise', artist: 'Eclectic Mix', grad: 'grad-7' },
      { name: 'SomaFM Drone Zone', artist: 'Ambient', grad: 'grad-9' },
      { name: 'NTS Radio', artist: 'London, UK', grad: 'grad-8' },
    ],
    favorites: [
      { name: 'The Dark Side of the Moon', artist: 'Pink Floyd', grad: 'grad-1', prism: true },
      { name: 'OK Computer', artist: 'Radiohead', grad: 'grad-4' },
      { name: 'Kind of Blue', artist: 'Miles Davis', grad: 'grad-9' },
      { name: 'In Rainbows', artist: 'Radiohead', grad: 'grad-5' },
    ],
  };

  const carousel = document.getElementById('carousel');

  function renderAlbums(filter) {
    const albums = albumSets[filter] || albumSets.all;
    carousel.innerHTML = '';
    albums.forEach((a, i) => {
      const tile = document.createElement('div');
      tile.className = 'album-tile';
      tile.innerHTML = `
        <div class="album-cover-wrap">
          <div class="album-cover ${a.grad} ${a.prism ? 'prism' : ''}"></div>
          <div class="album-play-overlay">
            <div class="album-play-circle">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
        <div class="album-meta">
          <div class="album-name">${a.name}</div>
          <div class="album-artist">${a.artist}</div>
        </div>
      `;
      tile.addEventListener('click', () => {
        document.getElementById('pTrack').textContent = a.name;
        document.getElementById('pArtist').textContent = a.artist;
        currentSeconds = 0;
        updateSeek();
      });
      carousel.appendChild(tile);
    });
  }

  renderAlbums('all');

  // ── Source Tab Filtering ──
  document.querySelectorAll('.source-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;
      // Animate out then in
      carousel.style.opacity = '0';
      carousel.style.transform = 'translateY(8px)';
      carousel.style.transition = 'opacity 0.15s ease-out, transform 0.15s ease-out';
      setTimeout(() => {
        renderAlbums(filter);
        carousel.scrollLeft = 0;
        requestAnimationFrame(() => {
          carousel.style.opacity = '1';
          carousel.style.transform = 'translateY(0)';
        });
      }, 150);
    });
  });

  // ── Scroll arrows ──
  document.getElementById('scrollLeft').addEventListener('click', () => {
    carousel.scrollBy({ left: -480, behavior: 'smooth' });
  });
  document.getElementById('scrollRight').addEventListener('click', () => {
    carousel.scrollBy({ left: 480, behavior: 'smooth' });
  });

  // ── Play / Pause ──
  const pPlayBtn = document.getElementById('pPlay');
  const pPlayIcon = document.getElementById('pPlayIcon');
  let isPlaying = false;
  let progressInterval = null;

  pPlayBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    pPlayIcon.innerHTML = isPlaying
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
    if (isPlaying) startProgress();
    else stopProgress();
  });

  // ── Seek ──
  const pSeekBar = document.getElementById('pSeekBar');
  const pSeekFill = document.getElementById('pSeekFill');
  const pTimeNow = document.getElementById('pTimeNow');
  const totalSeconds = 7 * 60 + 4;
  let currentSeconds = 2 * 60 + 34;

  function updateSeek() {
    const pct = (currentSeconds / totalSeconds) * 100;
    pSeekFill.style.width = pct + '%';
    const m = Math.floor(currentSeconds / 60);
    const s = Math.floor(currentSeconds % 60);
    pTimeNow.textContent = m + ':' + String(s).padStart(2, '0');
  }

  pSeekBar.addEventListener('click', (e) => {
    const rect = pSeekBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    currentSeconds = Math.max(0, Math.min(totalSeconds, pct * totalSeconds));
    updateSeek();
  });

  function startProgress() {
    if (progressInterval) return;
    progressInterval = setInterval(() => {
      currentSeconds += 1;
      if (currentSeconds >= totalSeconds) currentSeconds = 0;
      updateSeek();
    }, 1000);
  }
  function stopProgress() {
    clearInterval(progressInterval);
    progressInterval = null;
  }

  // ── Volume ──
  const volTrack = document.getElementById('volTrack');
  const volFill = document.getElementById('volFill');
  volTrack.addEventListener('click', (e) => {
    const rect = volTrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
    volFill.style.width = pct + '%';
  });

  // ── Prev / Next ──
  const queue = [
    { name: 'The Great Gig in the Sky', artist: 'Pink Floyd', dur: '5:43' },
    { name: 'Money', artist: 'Pink Floyd', dur: '6:22' },
    { name: 'Us and Them', artist: 'Pink Floyd', dur: '7:49' },
    { name: 'Any Colour You Like', artist: 'Pink Floyd', dur: '3:25' },
    { name: 'Brain Damage', artist: 'Pink Floyd', dur: '3:50' },
  ];
  let qIdx = -1;

  document.getElementById('pNext').addEventListener('click', () => {
    qIdx = (qIdx + 1) % queue.length;
    const t = queue[qIdx];
    document.getElementById('pTrack').textContent = t.name;
    document.getElementById('pArtist').textContent = t.artist;
    document.getElementById('pTimeDur').textContent = t.dur;
    currentSeconds = 0;
    updateSeek();
  });
  document.getElementById('pPrev').addEventListener('click', () => {
    if (currentSeconds > 5) {
      currentSeconds = 0;
      updateSeek();
    } else {
      qIdx = qIdx <= 0 ? queue.length - 1 : qIdx - 1;
      const t = queue[qIdx];
      document.getElementById('pTrack').textContent = t.name;
      document.getElementById('pArtist').textContent = t.artist;
      document.getElementById('pTimeDur').textContent = t.dur;
      currentSeconds = 0;
      updateSeek();
    }
  });
</script>
</body>
</html>
