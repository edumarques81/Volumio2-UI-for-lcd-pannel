<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stellar-viz WASM Test — 1920×440</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; color: #aaa; }
    .status {
      font-size: 14px;
      margin-bottom: 12px;
      padding: 6px 16px;
      border-radius: 8px;
      font-weight: 600;
    }
    .status.wasm { background: #1b4332; color: #95d5b2; }
    .status.js { background: #542500; color: #f4a261; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 20px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    button:hover { background: #2a2a2a; border-color: #666; }
    button.active { background: #e63946; border-color: #e63946; color: white; }
    canvas {
      border: 1px solid #222;
      border-radius: 12px;
      background: #0a0a0a;
      max-width: 100%;
    }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>stellar-viz WASM Visualisation Test</h1>
  <div id="status" class="status js">Loading...</div>
  <div class="controls">
    <button id="btn-spectrum" class="active" onclick="setMode('spectrum')">Spectrum</button>
    <button id="btn-waveform" onclick="setMode('waveform')">Waveform</button>
    <button id="btn-radial" onclick="setMode('radial')">Radial</button>
    <button id="btn-toggle" onclick="togglePlay()">⏸ Pause</button>
  </div>
  <canvas id="viz" width="1920" height="440"></canvas>
  <div class="info" id="fps">FPS: --</div>

  <!-- Load WASM module from relative path -->
  <script type="module">
    // Adjust this path based on where the pkg/ directory is relative to this HTML file
    const WASM_PATH = '../../../src/lib/wasm/stellar-viz/pkg/stellar_viz.js';

    let wasmModule = null;
    let physicsState = null;
    let usingWasm = false;
    let mode = 'spectrum';
    let playing = true;
    let startTime = performance.now();
    let frameCount = 0;
    let lastFpsUpdate = 0;

    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const fpsEl = document.getElementById('fps');

    const WIDTH = 1920, HEIGHT = 440, NUM_BARS = 64, NUM_POINTS = 200;

    // ---- JS fallback (identical to Rust logic) ----
    function hashNoise(x) {
      let n = Math.imul(x | 0, 374761393);
      n = Math.imul(n ^ (n >> 13), 1103515245);
      n = n ^ (n >> 16);
      return n / 2147483647;
    }
    function smoothstep(t) { return t * t * (3 - 2 * t); }
    function valueNoise1D(x) {
      const x0 = Math.floor(x);
      return hashNoise(x0) + (hashNoise(x0+1) - hashNoise(x0)) * smoothstep(x - x0);
    }
    function layeredNoise(x, oct) {
      let v=0,a=1,f=1,m=0;
      for(let i=0;i<oct;i++){v+=valueNoise1D(x*f)*a;m+=a;a*=0.5;f*=2;}
      return v/m;
    }
    function jsFakeAudio(time, n) {
      const r = new Float32Array(n);
      for(let i=0;i<n;i++){
        const x=i/n;
        const b=layeredNoise(x*4+time*0.8,4);
        const m=layeredNoise(x*8+time*1.5,3)*0.5;
        const d=layeredNoise(x*16+time*3,2)*0.25;
        const bb=Math.pow(1-x,2)*0.3;
        r[i]=Math.max(0,Math.min(1,(b+m+d+bb+1)/3));
      }
      return r;
    }
    function jsSpectrum(audio,nb,w,h) {
      const tw=w/nb, bw=tw*0.8, g=tw*0.2, spb=audio.length/nb;
      const r=new Float32Array(nb*4);
      for(let i=0;i<nb;i++){
        const s=Math.floor(i*spb),e=Math.min(Math.floor((i+1)*spb),audio.length);
        let sum=0;for(let j=s;j<e;j++)sum+=audio[j];
        const mag=Math.max(0,Math.min(1,sum/(e-s)));
        const sc=mag>0?Math.max(0,Math.min(1,(Math.log(mag)+4)/4)):0;
        const bh=sc*h*0.9;
        r[i*4]=i*tw+g/2; r[i*4+1]=h-bh; r[i*4+2]=bw; r[i*4+3]=bh;
      }
      return r;
    }
    function jsWaveform(audio,np,w,h) {
      const cy=h/2,amp=h*0.4,spp=audio.length/np;
      const r=new Float32Array(np*2);
      for(let i=0;i<np;i++){
        r[i*2]=(i/Math.max(1,np-1))*w;
        const s=Math.floor(i*spp),e=Math.min(Math.floor((i+1)*spp),audio.length);
        let sum=0;for(let j=s;j<e;j++)sum+=audio[j];
        r[i*2+1]=Math.max(0,Math.min(h,cy+(sum/(e-s)-0.5)*2*amp));
      }
      return r;
    }
    function jsRadial(audio,nb,cx,cy,rad) {
      const me=rad*0.8,spb=audio.length/nb;
      const r=new Float32Array(nb*4);
      for(let i=0;i<nb;i++){
        const a=(i/nb)*Math.PI*2-Math.PI/2;
        const s=Math.floor(i*spb),e=Math.min(Math.floor((i+1)*spb),audio.length);
        let sum=0;for(let j=s;j<e;j++)sum+=audio[j];
        const mag=Math.max(0,Math.min(1,sum/(e-s)));
        const bl=mag*me,c=Math.cos(a),sn=Math.sin(a);
        r[i*4]=cx+rad*c;r[i*4+1]=cy+rad*sn;
        r[i*4+2]=cx+(rad+bl)*c;r[i*4+3]=cy+(rad+bl)*sn;
      }
      return r;
    }
    let phH=null,phV=null;
    function jsPhysics(targets,dt) {
      if(!phH||phH.length!==targets.length){phH=new Float32Array(targets.length);phV=new Float32Array(targets.length);}
      dt=Math.min(dt,0.1);
      for(let i=0;i<phH.length;i++){
        const sp=-180*(phH[i]-(targets[i]||0)),dp=-12*phV[i];
        phV[i]+=(sp+dp)*dt;phH[i]+=phV[i]*dt;
        if(phH[i]<0){phH[i]=0;phV[i]=Math.max(0,phV[i]);}
      }
      return phH;
    }

    function makePalette(hex, n) {
      hex = hex.replace('#','');
      const cr=parseInt(hex.substring(0,2),16)||128;
      const cg=parseInt(hex.substring(2,4),16)||128;
      const cb=parseInt(hex.substring(4,6),16)||128;
      const p=[];
      for(let i=0;i<n;i++){
        const t=i/n;
        p.push(`rgb(${(cr*(1-t)+(255-cr)*t)*0.8+50|0},${(cg*(1-t)+(255-cg)*t)*0.8+30|0},${(cb*(1-t)+(255-cb)*t)*0.8+40|0})`);
      }
      return p;
    }

    // ---- Rendering ----
    const seedColour = '#e63946';
    let lastFrame = 0;

    function render(ts) {
      if(!playing){requestAnimationFrame(render);return;}
      const dt = lastFrame?(ts-lastFrame)/1000:1/60;
      lastFrame = ts;
      const time = (ts - startTime) / 1000;

      let audio;
      if(usingWasm) audio = wasmModule.generateFakeAudioFrame(time, 256);
      else audio = jsFakeAudio(time, 256);

      const palette = makePalette(seedColour, 8);

      if(mode==='spectrum') {
        let bars;
        if(usingWasm) bars = wasmModule.computeSpectrumBars(audio, NUM_BARS, WIDTH, HEIGHT);
        else bars = jsSpectrum(audio, NUM_BARS, WIDTH, HEIGHT);
        const targets=new Float32Array(NUM_BARS);
        for(let i=0;i<NUM_BARS;i++) targets[i]=bars[i*4+3];
        let heights;
        if(usingWasm&&physicsState) heights=physicsState.update(targets,dt);
        else heights=jsPhysics(targets,dt);
        ctx.clearRect(0,0,WIDTH,HEIGHT);
        for(let i=0;i<NUM_BARS;i++){
          const x=bars[i*4],w=bars[i*4+2],h=heights[i]||bars[i*4+3],y=HEIGHT-h;
          ctx.fillStyle=palette[Math.floor(i/NUM_BARS*(palette.length-1))]||palette[0];
          ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
        }
      } else if(mode==='waveform') {
        let pts;
        if(usingWasm) pts = wasmModule.computeWaveformPoints(audio, NUM_POINTS, WIDTH, HEIGHT);
        else pts = jsWaveform(audio, NUM_POINTS, WIDTH, HEIGHT);
        ctx.clearRect(0,0,WIDTH,HEIGHT);
        const grad=ctx.createLinearGradient(0,0,WIDTH,0);
        palette.forEach((c,i)=>grad.addColorStop(i/Math.max(1,palette.length-1),c));
        ctx.strokeStyle=grad;ctx.lineWidth=3;ctx.lineJoin='round';
        ctx.beginPath();
        for(let i=0;i<NUM_POINTS;i++){
          if(i===0) ctx.moveTo(pts[0],pts[1]);
          else ctx.lineTo(pts[i*2],pts[i*2+1]);
        }
        ctx.stroke();
      } else if(mode==='radial') {
        const cx=WIDTH/2,cy=HEIGHT/2,rad=HEIGHT*0.3;
        let lines;
        if(usingWasm) lines = wasmModule.computeRadialSpectrum(audio, NUM_BARS, cx, cy, rad);
        else lines = jsRadial(audio, NUM_BARS, cx, cy, rad);
        ctx.clearRect(0,0,WIDTH,HEIGHT);
        ctx.lineWidth=3;ctx.lineCap='round';
        for(let i=0;i<NUM_BARS;i++){
          ctx.strokeStyle=palette[Math.floor(i/NUM_BARS*(palette.length-1))]||palette[0];
          ctx.beginPath();ctx.moveTo(lines[i*4],lines[i*4+1]);ctx.lineTo(lines[i*4+2],lines[i*4+3]);ctx.stroke();
        }
      }

      // FPS counter
      frameCount++;
      if(ts-lastFpsUpdate>1000){
        fpsEl.textContent=`FPS: ${frameCount} | Engine: ${usingWasm?'WASM':'JS fallback'}`;
        frameCount=0; lastFpsUpdate=ts;
      }
      requestAnimationFrame(render);
    }

    // ---- Mode/play controls (exposed globally) ----
    window.setMode = function(m) {
      mode = m;
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-'+m)?.classList.add('active');
    };
    window.togglePlay = function() {
      playing = !playing;
      document.getElementById('btn-toggle').textContent = playing ? '⏸ Pause' : '▶ Play';
    };

    // ---- Init ----
    async function init() {
      try {
        const wasm = await import(WASM_PATH);
        await wasm.default();
        wasmModule = wasm;
        physicsState = new wasm.WasmPhysicsState(NUM_BARS);
        usingWasm = true;
        statusEl.textContent = '✅ WASM loaded — stellar-viz running natively';
        statusEl.className = 'status wasm';
      } catch(err) {
        console.warn('WASM failed:', err);
        statusEl.textContent = '⚠️ WASM failed — using JS fallback';
        statusEl.className = 'status js';
      }
      requestAnimationFrame(render);
    }
    init();
  </script>
</body>
</html>
