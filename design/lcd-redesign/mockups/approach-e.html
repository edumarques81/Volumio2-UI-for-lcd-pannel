<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Approach E — Spectrum</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --md-primary: #FFB1C8;
    --md-on-primary: #5D1133;
    --md-primary-container: #7B2949;
    --md-on-primary-container: #FFD9E3;
    --md-secondary: #E3BDC6;
    --md-on-secondary: #422931;
    --md-surface: #1A1114;
    --md-surface-container: #261A1E;
    --md-surface-container-high: #312228;
    --md-surface-container-low: #201318;
    --md-on-surface: #F0DEE2;
    --md-on-surface-variant: #D5BFC4;
    --md-outline: #9E8C91;
    --md-outline-variant: #514347;
    --md-background: #1A1114;
    --md-error: #FFB4AB;

    --md-shape-extra-small: 4px;
    --md-shape-small: 8px;
    --md-shape-medium: 12px;
    --md-shape-large: 16px;
    --md-shape-extra-large: 28px;
    --md-shape-full: 9999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 440px;
    overflow: hidden;
    background: var(--md-background);
    font-family: 'Plus Jakarta Sans', 'Roboto', sans-serif;
    color: var(--md-on-surface);
    cursor: default;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── Canvas ─── */
  #vizCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 440px;
    z-index: 1;
  }

  /* ─── Controls Overlay ─── */
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 440px;
    z-index: 10;
    background: rgba(26, 17, 20, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ─── Track Info (overlay) ─── */
  .overlay-track-info {
    text-align: center;
    margin-bottom: 24px;
  }
  .overlay-track-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--md-on-surface);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .overlay-track-artist {
    font-size: 18px;
    font-weight: 400;
    color: var(--md-on-surface-variant);
    margin-top: 4px;
  }
  .overlay-track-album {
    font-size: 14px;
    font-weight: 400;
    color: var(--md-outline);
    margin-top: 2px;
  }

  /* ─── Transport Controls ─── */
  .transport {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 20px;
  }
  .transport-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--md-surface-container-high);
    color: var(--md-on-surface);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }
  .transport-btn:hover {
    background: var(--md-primary-container);
    color: var(--md-on-primary-container);
    transform: scale(1.08);
  }
  .transport-btn:active {
    transform: scale(0.95);
  }
  .transport-btn.play {
    width: 72px;
    height: 72px;
    background: var(--md-primary);
    color: var(--md-on-primary);
    font-size: 28px;
    box-shadow: 0 4px 24px rgba(255, 177, 200, 0.3);
  }
  .transport-btn.play:hover {
    background: var(--md-on-primary-container);
    color: var(--md-primary-container);
    box-shadow: 0 6px 32px rgba(255, 177, 200, 0.45);
  }

  /* ─── Seek Bar ─── */
  .seek-container {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 600px;
  }
  .seek-time {
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
    min-width: 40px;
    font-family: 'Roboto', monospace;
    font-variant-numeric: tabular-nums;
  }
  .seek-time.end { text-align: right; }
  .seek-bar-wrap {
    flex: 1;
    height: 44px;
    display: flex;
    align-items: center;
    cursor: pointer;
    position: relative;
  }
  .seek-track {
    width: 100%;
    height: 4px;
    background: var(--md-outline-variant);
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }
  .seek-fill {
    height: 100%;
    background: var(--md-primary);
    border-radius: 2px;
    width: 36.2%;
    transition: width 0.1s linear;
    position: relative;
  }
  .seek-fill::after {
    content: '';
    position: absolute;
    right: -7px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--md-primary);
    transition: transform 0.2s ease;
    box-shadow: 0 0 8px rgba(255,177,200,0.5);
  }
  .seek-bar-wrap:hover .seek-fill::after {
    transform: translateY(-50%) scale(1);
  }

  /* ─── Volume (right edge) ─── */
  .volume-control {
    position: absolute;
    right: 48px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    height: 200px;
  }
  .volume-icon {
    font-size: 22px;
    color: var(--md-on-surface-variant);
    cursor: pointer;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.2s ease;
  }
  .volume-icon:hover {
    background: var(--md-surface-container-high);
  }
  .volume-slider-wrap {
    flex: 1;
    width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .volume-track {
    width: 4px;
    height: 100%;
    background: var(--md-outline-variant);
    border-radius: 2px;
    position: relative;
  }
  .volume-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 72%;
    background: var(--md-primary);
    border-radius: 2px;
  }
  .volume-fill::after {
    content: '';
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--md-primary);
    transition: transform 0.2s ease;
  }
  .volume-slider-wrap:hover .volume-fill::after {
    transform: translateX(-50%) scale(1);
  }
  .volume-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--md-outline);
  }

  /* ─── Persistent Info Pill ─── */
  #infoPill {
    position: absolute;
    bottom: 16px;
    right: 20px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(38, 26, 30, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--md-shape-full);
    border: 1px solid var(--md-outline-variant);
    transition: opacity 0.4s ease;
  }
  #infoPill.hidden-by-overlay {
    opacity: 0;
  }
  .pill-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
    white-space: nowrap;
  }
  .pill-text .pill-track {
    color: var(--md-on-surface);
    font-weight: 600;
  }
  .format-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    background: var(--md-primary-container);
    color: var(--md-on-primary-container);
    border-radius: var(--md-shape-full);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ─── Mode indicator ─── */
  #modeIndicator {
    position: absolute;
    bottom: 16px;
    left: 20px;
    z-index: 20;
    padding: 6px 14px;
    background: rgba(38, 26, 30, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--md-shape-full);
    border: 1px solid var(--md-outline-variant);
    font-size: 12px;
    font-weight: 600;
    color: var(--md-primary);
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  #modeIndicator.show {
    opacity: 1;
  }

  /* ─── SVG Icons inline ─── */
  .icon { display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<canvas id="vizCanvas" width="1920" height="440"></canvas>

<!-- Controls Overlay -->
<div id="overlay">
  <div class="overlay-track-info">
    <div class="overlay-track-title">Time</div>
    <div class="overlay-track-artist">Pink Floyd</div>
    <div class="overlay-track-album">The Dark Side of the Moon</div>
  </div>

  <div class="transport">
    <button class="transport-btn" aria-label="Previous" title="Previous">⏮</button>
    <button class="transport-btn play" aria-label="Play/Pause" title="Play/Pause" id="playBtn">▶</button>
    <button class="transport-btn" aria-label="Next" title="Next">⏭</button>
  </div>

  <div class="seek-container">
    <span class="seek-time">2:34</span>
    <div class="seek-bar-wrap" id="seekBar">
      <div class="seek-track">
        <div class="seek-fill" id="seekFill"></div>
      </div>
    </div>
    <span class="seek-time end">7:04</span>
  </div>

  <div class="volume-control">
    <div class="volume-icon">🔊</div>
    <div class="volume-slider-wrap" id="volumeSlider">
      <div class="volume-track">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
    <div class="volume-label">72%</div>
  </div>
</div>

<!-- Persistent Info Pill -->
<div id="infoPill">
  <span class="pill-text"><span class="pill-track">Time</span> — Pink Floyd</span>
  <span class="format-badge">FLAC 96/24</span>
</div>

<!-- Mode Indicator -->
<div id="modeIndicator">FREQUENCY BARS</div>

<script>
(function() {
  'use strict';

  // ─── Canvas Setup ───
  const canvas = document.getElementById('vizCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1920, H = 440;

  // ─── Visualization Modes ───
  const MODES = ['bars', 'waveform', 'radial'];
  const MODE_LABELS = { bars: 'FREQUENCY BARS', waveform: 'WAVEFORM', radial: 'RADIAL SPECTRUM' };
  let currentMode = 0;
  let modeIndicatorTimeout = null;

  // ─── Fake Audio Data ───
  const NUM_BARS = 96;
  const barData = new Float32Array(NUM_BARS);
  const barTargets = new Float32Array(NUM_BARS);
  const barVelocities = new Float32Array(NUM_BARS);

  // Smooth noise generator
  let noisePhase = 0;
  function fakeSpectrum(time) {
    noisePhase += 0.008;
    for (let i = 0; i < NUM_BARS; i++) {
      const freq = i / NUM_BARS;
      // Simulate bass-heavy spectrum with harmonics
      const bass = Math.pow(Math.sin(time * 1.2 + i * 0.05), 2) * (1 - freq * 0.6);
      const mid = Math.sin(time * 2.8 + i * 0.12) * 0.5 * Math.exp(-Math.pow(freq - 0.35, 2) * 20);
      const treble = Math.sin(time * 4.5 + i * 0.25) * 0.3 * freq;
      const noise = (Math.sin(noisePhase * 3.7 + i * 1.3) * 0.5 + 0.5) * 0.25;
      const pulse = Math.pow(Math.sin(time * 0.7), 4) * 0.3 * (1 - freq);

      barTargets[i] = Math.max(0.02, Math.min(1, bass + mid + treble + noise + pulse));
    }
  }

  function smoothBars() {
    for (let i = 0; i < NUM_BARS; i++) {
      const diff = barTargets[i] - barData[i];
      barVelocities[i] += diff * 0.3;
      barVelocities[i] *= 0.7; // damping
      barData[i] += barVelocities[i];
      barData[i] = Math.max(0.01, Math.min(1, barData[i]));
    }
  }

  // ─── Gradient Helpers ───
  function barGradient(x, barW, h, val) {
    const g = ctx.createLinearGradient(x, H, x, H - h);
    g.addColorStop(0, 'rgba(90, 20, 80, 0.9)');      // deep purple base
    g.addColorStop(0.3, 'rgba(160, 40, 100, 0.9)');   // magenta
    g.addColorStop(0.6, 'rgba(255, 60, 150, 0.85)');   // hot pink
    g.addColorStop(0.85, 'rgba(180, 80, 255, 0.8)');   // violet
    g.addColorStop(1, `rgba(80, 220, 255, ${0.6 + val * 0.4})`); // cyan peak
    return g;
  }

  // ─── Draw: Frequency Bars ───
  function drawBars(time) {
    ctx.clearRect(0, 0, W, H);

    const gap = 4;
    const totalGap = gap * (NUM_BARS - 1);
    const barW = (W - totalGap) / NUM_BARS;

    // Background glow
    const bgGlow = ctx.createRadialGradient(W/2, H, 0, W/2, H, W * 0.6);
    bgGlow.addColorStop(0, 'rgba(120, 30, 80, 0.12)');
    bgGlow.addColorStop(1, 'rgba(26, 17, 20, 0)');
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < NUM_BARS; i++) {
      const val = barData[i];
      const x = i * (barW + gap);
      const h = val * (H - 20);

      // Glow layer
      ctx.save();
      ctx.shadowColor = `rgba(255, 80, 180, ${val * 0.6})`;
      ctx.shadowBlur = 12 + val * 20;
      ctx.fillStyle = barGradient(x, barW, h, val);
      ctx.beginPath();
      const r = Math.min(barW / 2, 3);
      ctx.roundRect(x, H - h, barW, h, [r, r, 0, 0]);
      ctx.fill();
      ctx.restore();

      // Bright cap on top
      if (val > 0.1) {
        ctx.fillStyle = `rgba(200, 240, 255, ${val * 0.7})`;
        ctx.fillRect(x, H - h, barW, 2);
      }

      // Reflection below (subtle)
      const reflG = ctx.createLinearGradient(x, H, x, H + 30);
      reflG.addColorStop(0, `rgba(160, 40, 100, ${val * 0.15})`);
      reflG.addColorStop(1, 'rgba(26, 17, 20, 0)');
      ctx.fillStyle = reflG;
      ctx.fillRect(x, H, barW, 30);
    }
  }

  // ─── Draw: Waveform ───
  function drawWaveform(time) {
    ctx.clearRect(0, 0, W, H);

    // Background
    const bgGlow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.5);
    bgGlow.addColorStop(0, 'rgba(80, 20, 120, 0.08)');
    bgGlow.addColorStop(1, 'rgba(26, 17, 20, 0)');
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, W, H);

    const centerY = H / 2;
    const amplitude = H * 0.35;

    // Draw multiple layered waveforms
    for (let layer = 0; layer < 3; layer++) {
      const layerAlpha = [0.15, 0.3, 0.8][layer];
      const layerWidth = [6, 3, 2][layer];
      const timeOffset = layer * 0.3;
      const freqMult = 1 + layer * 0.5;

      ctx.beginPath();
      ctx.strokeStyle = layer === 2
        ? 'rgba(255, 177, 200, 0.9)'
        : `rgba(180, 80, 255, ${layerAlpha})`;
      ctx.lineWidth = layerWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (layer === 2) {
        ctx.shadowColor = 'rgba(255, 100, 200, 0.5)';
        ctx.shadowBlur = 16;
      }

      for (let x = 0; x <= W; x += 2) {
        const i = Math.floor((x / W) * NUM_BARS);
        const val = barData[Math.min(i, NUM_BARS - 1)];
        const wave = Math.sin((x / W) * Math.PI * 4 * freqMult + time * 2 + timeOffset);
        const envelope = Math.sin((x / W) * Math.PI);
        const y = centerY + wave * val * amplitude * envelope;

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Glow dots at peaks
    for (let x = 0; x < W; x += 40) {
      const i = Math.floor((x / W) * NUM_BARS);
      const val = barData[Math.min(i, NUM_BARS - 1)];
      if (val > 0.5) {
        const wave = Math.sin((x / W) * Math.PI * 4 + time * 2);
        const envelope = Math.sin((x / W) * Math.PI);
        const y = centerY + wave * val * amplitude * envelope;
        ctx.beginPath();
        ctx.arc(x, y, 2 + val * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(80, 220, 255, ${val * 0.6})`;
        ctx.fill();
      }
    }
  }

  // ─── Draw: Radial Spectrum ───
  function drawRadial(time) {
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2;
    const innerR = 60;
    const maxR = 190;

    // Background glow
    const bgGlow = ctx.createRadialGradient(cx, cy, innerR, cx, cy, maxR + 100);
    bgGlow.addColorStop(0, 'rgba(120, 30, 80, 0.1)');
    bgGlow.addColorStop(1, 'rgba(26, 17, 20, 0)');
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, W, H);

    // Inner circle glow
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    const innerG = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
    innerG.addColorStop(0, 'rgba(255, 177, 200, 0.15)');
    innerG.addColorStop(0.7, 'rgba(123, 41, 73, 0.2)');
    innerG.addColorStop(1, 'rgba(90, 20, 80, 0.1)');
    ctx.fillStyle = innerG;
    ctx.fill();

    // Ring
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 177, 200, 0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Radial bars
    const numRadialBars = 128;
    const angleStep = (Math.PI * 2) / numRadialBars;

    for (let i = 0; i < numRadialBars; i++) {
      const dataIdx = Math.floor((i / numRadialBars) * NUM_BARS);
      const val = barData[dataIdx];
      const angle = i * angleStep - Math.PI / 2 + time * 0.15;

      const barLen = val * maxR;
      const x1 = cx + Math.cos(angle) * innerR;
      const y1 = cy + Math.sin(angle) * innerR;
      const x2 = cx + Math.cos(angle) * (innerR + barLen);
      const y2 = cy + Math.sin(angle) * (innerR + barLen);

      const g = ctx.createLinearGradient(x1, y1, x2, y2);
      g.addColorStop(0, 'rgba(90, 20, 80, 0.8)');
      g.addColorStop(0.5, `rgba(255, 60, 150, ${0.5 + val * 0.4})`);
      g.addColorStop(1, `rgba(80, 220, 255, ${val * 0.8})`);

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = g;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';

      ctx.shadowColor = `rgba(255, 80, 200, ${val * 0.4})`;
      ctx.shadowBlur = 8 + val * 12;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Peak dot
      if (val > 0.4) {
        ctx.beginPath();
        ctx.arc(x2, y2, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 240, 255, ${val * 0.8})`;
        ctx.fill();
      }
    }

    // Left and right side decorative bars (to fill the wide space)
    for (let side = 0; side < 2; side++) {
      const baseX = side === 0 ? 100 : W - 100;
      const dir = side === 0 ? 1 : -1;
      const numSideBars = 32;
      const sideGap = 6;
      const sideBarW = 4;

      for (let i = 0; i < numSideBars; i++) {
        const dataIdx = Math.floor((i / numSideBars) * NUM_BARS);
        const val = barData[side === 0 ? dataIdx : NUM_BARS - 1 - dataIdx];
        const x = baseX + dir * i * (sideBarW + sideGap);
        const h = val * (H * 0.6);
        const y = (H - h) / 2;

        const g = ctx.createLinearGradient(x, y + h, x, y);
        g.addColorStop(0, 'rgba(90, 20, 80, 0.4)');
        g.addColorStop(0.5, `rgba(200, 50, 130, ${0.3 + val * 0.3})`);
        g.addColorStop(1, `rgba(80, 220, 255, ${val * 0.3})`);

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(x, y, sideBarW, h, 2);
        ctx.fill();
      }
    }
  }

  // ─── Animation Loop ───
  let startTime = performance.now();

  function animate(now) {
    const elapsed = (now - startTime) / 1000;

    fakeSpectrum(elapsed);
    smoothBars();

    switch (MODES[currentMode]) {
      case 'bars': drawBars(elapsed); break;
      case 'waveform': drawWaveform(elapsed); break;
      case 'radial': drawRadial(elapsed); break;
    }

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ─── Overlay Controls ───
  const overlay = document.getElementById('overlay');
  const infoPill = document.getElementById('infoPill');
  const modeIndicator = document.getElementById('modeIndicator');
  let overlayVisible = false;
  let hideTimeout = null;
  let isPlaying = true;
  const playBtn = document.getElementById('playBtn');

  function showOverlay() {
    overlayVisible = true;
    overlay.classList.add('visible');
    infoPill.classList.add('hidden-by-overlay');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(hideOverlay, 4000);
  }

  function hideOverlay() {
    overlayVisible = false;
    overlay.classList.remove('visible');
    infoPill.classList.remove('hidden-by-overlay');
  }

  function resetHideTimer() {
    if (overlayVisible) {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideOverlay, 4000);
    }
  }

  // Click canvas to show/hide overlay
  canvas.addEventListener('click', function(e) {
    if (!overlayVisible) {
      showOverlay();
    }
  });

  // Click overlay background to dismiss
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      hideOverlay();
    }
  });

  // Keep overlay alive on interaction
  overlay.addEventListener('mousemove', resetHideTimer);
  overlay.addEventListener('touchstart', resetHideTimer);

  // Play/Pause toggle
  playBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '▶' : '⏸';
    resetHideTimer();
  });

  // All transport buttons
  document.querySelectorAll('.transport-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      resetHideTimer();
    });
  });

  // Seek bar interaction
  const seekBar = document.getElementById('seekBar');
  const seekFill = document.getElementById('seekFill');
  seekBar.addEventListener('click', function(e) {
    e.stopPropagation();
    const rect = seekBar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    seekFill.style.width = (pct * 100) + '%';
    // Update time display
    const totalSec = 7 * 60 + 4;
    const curSec = Math.floor(pct * totalSec);
    const mm = Math.floor(curSec / 60);
    const ss = curSec % 60;
    seekBar.previousElementSibling.textContent = mm + ':' + String(ss).padStart(2, '0');
    resetHideTimer();
  });

  // Volume slider
  const volumeSlider = document.getElementById('volumeSlider');
  const volumeFill = document.getElementById('volumeFill');
  volumeSlider.addEventListener('click', function(e) {
    e.stopPropagation();
    const rect = volumeSlider.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
    volumeFill.style.height = (pct * 100) + '%';
    volumeSlider.nextElementSibling.textContent = Math.round(pct * 100) + '%';
    resetHideTimer();
  });

  // Double-click to cycle visualization mode
  let lastClickTime = 0;
  canvas.addEventListener('dblclick', function(e) {
    e.preventDefault();
    currentMode = (currentMode + 1) % MODES.length;
    modeIndicator.textContent = MODE_LABELS[MODES[currentMode]];
    modeIndicator.classList.add('show');
    clearTimeout(modeIndicatorTimeout);
    modeIndicatorTimeout = setTimeout(function() {
      modeIndicator.classList.remove('show');
    }, 2000);
  });

  // Prevent text selection on double-click
  canvas.addEventListener('mousedown', function(e) {
    if (e.detail > 1) e.preventDefault();
  });

})();
</script>
</body>
</html>
