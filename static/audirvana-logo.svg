<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6B4EA0"/>
      <stop offset="100%" stop-color="#3D2870"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0" y1="40" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4C0FF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>
  <!-- Subtle inner highlight -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" opacity="0.3"/>
  <!-- Stylised "A" letterform — two legs + crossbar -->
  <g filter="url(#glow)">
    <!-- Left leg -->
    <path d="M48 155 L85 45 L100 45 L63 155 Z" fill="url(#aGrad)"/>
    <!-- Right leg -->
    <path d="M152 155 L115 45 L100 45 L137 155 Z" fill="url(#aGrad)"/>
    <!-- Crossbar -->
    <rect x="68" y="104" width="64" height="14" rx="7" fill="url(#aGrad)"/>
    <!-- Small dot / accent below A — Audirvana brand detail -->
    <circle cx="100" cy="170" r="7" fill="url(#aGrad)" opacity="0.6"/>
  </g>
</svg>
